<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Modo Oscuro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar para mejor estética en modo oscuro */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280; 
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col items-center p-4 sm:p-8">

    <div class="w-full max-w-3xl">
        
        <!-- Header / Contadores -->
        <header class="flex flex-col sm:flex-row justify-between items-center bg-gray-800 p-4 rounded-xl shadow-lg mb-6 border border-gray-700">
            <div class="mb-4 sm:mb-0">
                <h1 class="text-xl font-bold text-blue-400">Cuestionario</h1>
                <p class="text-sm text-gray-400" id="question-counter">Pregunta 1 de 17</p>
            </div>
            
            <div class="flex space-x-4">
                <div class="flex items-center bg-gray-700 px-4 py-2 rounded-lg">
                    <svg class="w-5 h-5 text-green-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    <span class="font-bold text-green-400" id="correct-counter">0</span>
                    <span class="ml-1 text-sm text-gray-300">Aciertos</span>
                </div>
                <div class="flex items-center bg-gray-700 px-4 py-2 rounded-lg">
                    <svg class="w-5 h-5 text-red-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    <span class="font-bold text-red-400" id="incorrect-counter">0</span>
                    <span class="ml-1 text-sm text-gray-300">Fallos</span>
                </div>
            </div>
        </header>

        <!-- Contenedor Principal del Quiz -->
        <main id="quiz-container" class="bg-gray-800 p-6 sm:p-8 rounded-xl shadow-lg border border-gray-700 fade-in">
            <h2 id="question-text" class="text-lg sm:text-xl font-medium mb-6 leading-relaxed">
                Cargando pregunta...
            </h2>
            
            <div id="options-container" class="space-y-3">
                <!-- Las opciones se generan dinámicamente aquí -->
            </div>

            <div class="mt-8 flex justify-end">
                <button id="next-btn" class="hidden bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-lg transition duration-200 shadow-md">
                    Siguiente
                </button>
            </div>
        </main>

        <!-- Pantalla de Resultados (Oculta por defecto) -->
        <section id="results-container" class="hidden bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-700 text-center fade-in">
            <h2 class="text-3xl font-bold text-blue-400 mb-4">¡Cuestionario completado!</h2>
            <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto mb-8">
                <div class="bg-gray-700 p-4 rounded-lg">
                    <p class="text-sm text-gray-400">Aciertos</p>
                    <p class="text-3xl font-bold text-green-400" id="final-correct">0</p>
                </div>
                <div class="bg-gray-700 p-4 rounded-lg">
                    <p class="text-sm text-gray-400">Fallos</p>
                    <p class="text-3xl font-bold text-red-400" id="final-incorrect">0</p>
                </div>
            </div>
            <p id="final-message" class="text-lg mb-8 text-gray-300"></p>
            <button onclick="restartQuiz()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg transition duration-200 shadow-md">
                Volver a intentar
            </button>
        </section>

    </div>

    <script>
        // Base de datos de preguntas
        const questions = [
            {
                text: "1. El objeto de la ley que regula la Declaración de voluntad vital anticipada consiste en:",
                options: [
                    "a. Regular aquellas situaciones críticas en las que los profesionales sanitarios deben tomar decisiones sobre la vida de sus pacientes ante la incapacidad de estos de expresarse por sí mismos.",
                    "b. Regular situaciones críticas en personas mayores de 65 años.",
                    "c. Disponer de un registro de voluntades anticipadas con la posibilidad de que cualquier persona pueda consultarlo.",
                    "d. Disponer de un registro de voluntades anticipadas solo para mayores de 65 años."
                ],
                correct: 0
            },
            {
                text: "2. ¿Se consideran accidentes laborales aquellos que suceden al ir o volver del trabajo?",
                options: [
                    "a. Sí, siempre que sean en el transporte privado.",
                    "b. No, ya que no suceden en el horario laboral.",
                    "c. Sí, siempre que suceda en el trayecto habitual entre el lugar de trabajo y su domicilio.",
                    "d. Sí, siempre que suceda en los tiempos establecidos entre domicilio y lugar de trabajo."
                ],
                correct: 2
            },
            {
                text: "4. ¿Qué tipo de cereal no puede comer una persona celiaca?",
                options: [
                    "a. Soja",
                    "b. Trigo, centeno, cebada y algunas variedades de avena",
                    "c. Trigo sarraceno",
                    "d. Son correctas las respuestas b y c"
                ],
                correct: 1
            },
            {
                text: "5. La enfermedad celiaca (EC) se caracteriza por presentar:",
                options: [
                    "a. Una clínica heterogénea.",
                    "b. Lesión más o menos severa de la mucosa intestinal.",
                    "c. Síntomas únicamente digestivos.",
                    "d. Las respuestas a) y b) son correctas."
                ],
                correct: 3
            },
            {
                text: "6. Una vez diagnosticado de EC, al paciente:",
                options: [
                    "a. Se le debe realizar un tratamiento de por vida.",
                    "b. No es necesario seguir con controles analíticos.",
                    "c. Sólo si se presenta clínica se repetirán marcadores serológicos.",
                    "d. Solo se controlará el cumplimiento dietético."
                ],
                correct: 0
            },
            {
                text: "7. Según la clasificación de Marsh, ¿en qué grado los linfocitos intraepiteliales son normales?",
                options: [
                    "a. Marsh 0.",
                    "b. Marsh I-III.",
                    "c. Marsh IV.",
                    "d. Las respuestas a) y c) son correctas."
                ],
                correct: 3
            },
            {
                text: "8. Indique cuál de las siguientes frases sobre la EC es incorrecta:",
                options: [
                    "a. El tipo de presentación clínica puede influir en su diagnóstico.",
                    "b. En la práctica clínica ha aumentado el número de casos pero sigue estando infravalorada.",
                    "c. Los estudios epidemiológicos de la EC ponen de manifiesto que no existe retraso en su diagnóstico.",
                    "d. Puede aparecer a cualquier edad, no distingue sexo ni raza."
                ],
                correct: 2
            },
            {
                text: "9. Respecto a la dieta exenta de gluten:",
                options: [
                    "a. La supresión del gluten de la dieta subsana la intolerancia que presentan los afectados.",
                    "b. Consigue el control de la enfermedad.",
                    "c. Logra la recuperación de la mucosa intestinal, pero no normaliza la clínica del paciente.",
                    "d. Solo debe ser estricta hasta normalizar la mucosa intestinal."
                ],
                correct: 1
            },
            {
                text: "10. Razone para el diagnóstico temprano de la enfermedad celiaca. Señale la incorrecta:",
                options: [
                    "a. Entre el 80-90% de los pacientes no están diagnosticados.",
                    "b. El retraso diagnóstico de 120 meses o más está relacionado con un aumento de la mortalidad.",
                    "c. El diagnóstico temprano disminuye las complicaciones.",
                    "d. Sólo las respuestas a) y c) son correctas."
                ],
                correct: 3
            },
            {
                text: "11. En las enfermedades celiacas, los falsos negativos se dan fundamentalmente por:",
                options: [
                    "a. Lesiones en la superficie de la mucosa.",
                    "b. Dieta previa sin gluten.",
                    "c. Poca experiencia del patólogo.",
                    "d. Lesiones no accesibles por endoscopia."
                ],
                correct: 1
            },
            {
                text: "12. Señale la correcta:",
                options: [
                    "a. La endoscopia es una herramienta útil para detectar la enfermedad celiaca.",
                    "b. Solo la presencia de marcadores positivos y patrón histológico característico, con una buena respuesta a la dieta sin gluten, son indicativos de enfermedad celiaca.",
                    "c. Los marcadores de atrofia son muy sugestivos de enfermedad celiaca.",
                    "d. Las respuestas b) y c) son correctas."
                ],
                correct: 3
            },
            {
                text: "13. Una mujer de 45 años, madre de un niño celiaco y sin síntomas ni signos de patología digestiva, es evaluada por anemia ferropénica detectada en analíticas rutinarias. ¿Cuál de los siguientes enunciados es cierto respecto a este caso?",
                options: [
                    "a. La ausencia de diarrea hace que se pueda excluir la enfermedad celiaca como causa de la anemia de esta paciente.",
                    "b. La determinación del alelo HLA-DQ2, de resultar positiva, establecería el diagnóstico de enfermedad celiaca.",
                    "c. La evaluación inicial debería incluir estudio genético y marcadores serológicos: la determinación de anticuerpos antiendomisio y/o antitransglutaminasa tisular.",
                    "d. La edad de la paciente permite excluir la enfermedad celiaca del diagnóstico diferencial."
                ],
                correct: 2
            },
            {
                text: "14. Los anticuerpos antigliadina y antiendomisio son específicos de la enfermedad celiaca especialmente si son de la clase:",
                options: [
                    "a. IgG",
                    "b. IgM",
                    "c. IgA",
                    "d. IgE"
                ],
                correct: 2
            },
            {
                text: "15. ¿Cuál de los siguientes cereales puede ser tomado libremente por los pacientes con enfermedad celiaca?",
                options: [
                    "a. Avena",
                    "b. Trigo",
                    "c. Centeno",
                    "d. Soja"
                ],
                correct: 3
            },
            {
                text: "16. En relación a un paciente adulto diagnosticado de enteropatía por gluten, señale la respuesta falsa:",
                options: [
                    "a. Si cumple una dieta libre en gluten, tendrá un 80% de posibilidades de mejoría clínica.",
                    "b. Es necesario estudiar a sus hermanos, pues la incidencia de la enfermedad es mayor que la de la población general.",
                    "c. Es aconsejable realizar la prueba de sobrecarga de gluten para asegurar el diagnóstico.",
                    "d. La determinación aislada de anticuerpos no es suficiente para establecer el diagnóstico."
                ],
                correct: 2
            },
            {
                text: "17. Paciente de 23 años diagnosticado de enfermedad celiaca y sometido a dieta sin gluten. Recuperó peso pero siguió con dos o tres deposiciones al día de heces líquidas. Los anticuerpos antiendomisio tipo IgA seguían positivos tras dos años de tratamiento. Causa más probable de esta insuficiente respuesta al tratamiento:",
                options: [
                    "a. Intolerancia a la lactosa.",
                    "b. Linfoma intestinal.",
                    "c. Esprúe refractario.",
                    "d. Incumplimiento de la dieta sin gluten."
                ],
                correct: 3
            },
            {
                text: "18. Un paciente de 58 años acude a la consulta por diarrea de 3 meses, con dolores cólicos abdominales, síndrome anémico y edemas en miembros inferiores. Le diagnosticaron la enfermedad celiaca hace 15 años mediante biopsia intestinal y realizó dieta sin gluten durante 3 meses. ¿Cuál de las siguientes afirmaciones es la correcta?",
                options: [
                    "a. El paciente posiblemente no padecía enfermedad celiaca.",
                    "b. La nueva instauración de una dieta sin gluten mejorará el cuadro clínico.",
                    "c. La determinación en suero de anticuerpos antigliadina nos ayudará a conocer si la enfermedad está en actividad.",
                    "d. Es necesario descartar la presencia de linfoma intestinal."
                ],
                correct: 3
            }
        ];

        // Estado del Quiz
        let currentQuestionIndex = 0;
        let correctAnswers = 0;
        let incorrectAnswers = 0;
        let hasAnswered = false;

        // Referencias del DOM
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const nextBtn = document.getElementById('next-btn');
        const questionCounter = document.getElementById('question-counter');
        const correctCounter = document.getElementById('correct-counter');
        const incorrectCounter = document.getElementById('incorrect-counter');
        const quizContainer = document.getElementById('quiz-container');
        const resultsContainer = document.getElementById('results-container');

        // Inicializar el Quiz
        function loadQuestion() {
            hasAnswered = false;
            nextBtn.classList.add('hidden');
            
            const currentQuestion = questions[currentQuestionIndex];
            
            // Actualizar contadores superiores
            questionCounter.innerText = `Pregunta ${currentQuestionIndex + 1} de ${questions.length}`;
            
            // Renderizar pregunta
            questionText.innerText = currentQuestion.text;
            
            // Limpiar y renderizar opciones
            optionsContainer.innerHTML = '';
            
            currentQuestion.options.forEach((optionText, index) => {
                const button = document.createElement('button');
                button.className = 'w-full text-left p-4 rounded-lg bg-gray-700 hover:bg-gray-600 border border-gray-600 transition duration-150 ease-in-out focus:outline-none';
                button.innerText = optionText;
                button.onclick = () => selectOption(index, button);
                optionsContainer.appendChild(button);
            });

            // Animación de aparición
            quizContainer.classList.remove('fade-in');
            void quizContainer.offsetWidth; // Trigger reflow
            quizContainer.classList.add('fade-in');
        }

        // Manejar la selección de una respuesta
        function selectOption(selectedIndex, selectedButton) {
            if (hasAnswered) return; // Evitar que responda dos veces
            hasAnswered = true;

            const currentQuestion = questions[currentQuestionIndex];
            const isCorrect = selectedIndex === currentQuestion.correct;
            const allButtons = optionsContainer.querySelectorAll('button');

            // Deshabilitar todos los botones
            allButtons.forEach(btn => {
                btn.classList.remove('hover:bg-gray-600', 'cursor-pointer');
                btn.classList.add('cursor-default', 'opacity-70');
            });

            if (isCorrect) {
                // Respuesta correcta
                selectedButton.classList.remove('bg-gray-700', 'border-gray-600');
                selectedButton.classList.add('bg-green-900', 'border-green-500', 'text-green-100', 'opacity-100');
                correctAnswers++;
                correctCounter.innerText = correctAnswers;
            } else {
                // Respuesta incorrecta
                selectedButton.classList.remove('bg-gray-700', 'border-gray-600');
                selectedButton.classList.add('bg-red-900', 'border-red-500', 'text-red-100', 'opacity-100');
                incorrectAnswers++;
                incorrectCounter.innerText = incorrectAnswers;

                // Resaltar la correcta para que aprenda
                const correctButton = allButtons[currentQuestion.correct];
                correctButton.classList.remove('bg-gray-700', 'border-gray-600');
                correctButton.classList.add('bg-green-900', 'border-green-500', 'text-green-100', 'opacity-100');
            }

            // Mostrar el botón de siguiente
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.innerText = 'Ver Resultados';
            } else {
                nextBtn.innerText = 'Siguiente';
            }
            nextBtn.classList.remove('hidden');
        }

        // Ir a la siguiente pregunta o finalizar
        nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResults();
            }
        });

        // Pantalla de finalización
        function showResults() {
            quizContainer.classList.add('hidden');
            resultsContainer.classList.remove('hidden');
            
            document.getElementById('final-correct').innerText = correctAnswers;
            document.getElementById('final-incorrect').innerText = incorrectAnswers;

            const percentage = (correctAnswers / questions.length) * 100;
            const messageEl = document.getElementById('final-message');
            
            if (percentage === 100) {
                messageEl.innerText = "¡Excelente! Has acertado todas las preguntas.";
            } else if (percentage >= 70) {
                messageEl.innerText = "¡Muy buen trabajo! Tienes un gran conocimiento sobre la materia.";
            } else if (percentage >= 50) {
                messageEl.innerText = "Has aprobado, pero hay margen de mejora. ¡Sigue repasando!";
            } else {
                messageEl.innerText = "Te recomendamos volver a estudiar estos conceptos e intentarlo de nuevo.";
            }
        }

        // Reiniciar
        function restartQuiz() {
            currentQuestionIndex = 0;
            correctAnswers = 0;
            incorrectAnswers = 0;
            correctCounter.innerText = "0";
            incorrectCounter.innerText = "0";
            
            resultsContainer.classList.add('hidden');
            quizContainer.classList.remove('hidden');
            
            loadQuestion();
        }

        // Iniciar la primera pregunta al cargar
        loadQuestion();

    </script>
</body>
</html>
